name: Scala CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
    # labeled/unlabeled so adding/removing the `clean` label re-runs without a new push
    types: [opened, synchronize, reopened, labeled, unlabeled]
  workflow_dispatch:
    inputs:
      clean:
        description: Run cleanFull before tests (wipe build + action caches)
        type: boolean
        default: false

permissions:
  contents: read

env:
  JAVA_OPTS: -Dfile.encoding=UTF-8

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Default keeps sbt 2 action cache warm. Opt into a full wipe with:
      #   - PR label `clean`
      #   - push commit message containing `[clean]`
      #   - workflow_dispatch input `clean=true`
      - name: Decide whether to cleanFull
        id: opts
        shell: bash
        run: |
          want_clean=false
          case "${{ github.event_name }}" in
            workflow_dispatch)
              if [ "${{ inputs.clean }}" = "true" ]; then want_clean=true; fi
              ;;
            pull_request)
              labels='${{ join(github.event.pull_request.labels.*.name, ',') }}'
              IFS=',' read -ra parts <<< "$labels"
              for label in "${parts[@]}"; do
                if [ "$label" = "clean" ]; then want_clean=true; fi
              done
              ;;
            push)
              if git log -1 --pretty=%B | grep -qE '(^|[[:space:]])\[clean\]([[:space:]]|$)'; then
                want_clean=true
              fi
              ;;
          esac
          echo "clean=$want_clean" >> "$GITHUB_OUTPUT"
          if [ "$want_clean" = "true" ]; then
            echo "Will run cleanFull before tests (skip action-cache restore)"
          else
            echo "Skipping cleanFull (incremental build + sbt action cache)"
          fi

      - name: Set up JDK
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: '25'
          # Coursier / ivy / ~/.sbt dependency caches only, not sbt 2 task outputs.
          cache: sbt

      - name: Set up sbt
        uses: sbt/setup-sbt@66fb4376e81982c7d92a4074170846fff88e2e30 # v1.5.0
        with:
          # Explicit ~/.cache/sbt restore/save below (survives failed jobs).
          # setup-sbt's built-in disk-cache only saves on job success.
          disk-cache: false

      # sbt 2 action cache (Bazel-style task caching). Lives at ~/.cache/sbt on Linux.
      - name: Restore sbt action cache
        if: steps.opts.outputs.clean != 'true'
        id: sbt-action-cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/sbt
          key: ${{ runner.os }}-sbt-action-${{ hashFiles('**/build.sbt', '**/project/*.sbt', '**/project/build.properties') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-sbt-action-${{ hashFiles('**/build.sbt', '**/project/*.sbt', '**/project/build.properties') }}-
            ${{ runner.os }}-sbt-action-

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: npm

      # The JS/DOM tests run under jsdom, and the canvas helper's getContext("2d") needs the
      # native `canvas` npm package, which builds against these system libs. `npm ci` installs
      # jsdom + canvas at the exact versions pinned in package-lock.json.
      - name: Install canvas build dependencies
        run: sudo apt-get update && sudo apt-get install -y libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev

      - name: Install Node dependencies (jsdom, canvas)
        run: npm ci

      # Scala Native's test link runs clang + the Boehm GC; without these the native rows fail to link.
      - name: Install Scala Native build dependencies
        run: sudo apt-get install -y clang libstdc++-12-dev libgc-dev libunwind-dev

      - name: Build and test
        shell: bash
        run: |
          if [ "${{ steps.opts.outputs.clean }}" = "true" ]; then
            sbt -v "cleanFull; scalafmtCheckAll; testFull"
          else
            sbt -v "scalafmtCheckAll; testFull"
          fi

      # Persist even when the job fails; otherwise a red PR never warms the next push.
      - name: Save sbt action cache
        if: always() && steps.sbt-action-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/sbt
          key: ${{ runner.os }}-sbt-action-${{ hashFiles('**/build.sbt', '**/project/*.sbt', '**/project/build.properties') }}-${{ github.sha }}

  dependency-submission:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: '25'
          cache: sbt

      - name: Set up sbt
        uses: sbt/setup-sbt@66fb4376e81982c7d92a4074170846fff88e2e30 # v1.5.0
        with:
          disk-cache: false

      - name: Submit dependency graph
        uses: scalacenter/sbt-dependency-submission@d84eef4c09e633bcf5f113bcad7fd5e9af1baee9 # v3.2.3
