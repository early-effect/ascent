name: Release

# Publishes to Maven Central (Sonatype Central Portal) when a version tag is
# pushed. sbt-dynver-ci derives the version from the tag (v0.1.0 -> 0.1.0).
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0          # full history+tags for sbt-dynver-ci

      - name: Set up JDK
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: '25'
          cache: sbt

      - name: Set up sbt
        uses: sbt/setup-sbt@9d56cf12e9b58d219605e1d8bfe69a8395fedde0 # v1.5.1

      - name: Import signing key
        env:
          PGP_SECRET: ${{ secrets.PGP_SECRET }}
        run: |
          mkdir -p ~/.gnupg && chmod 700 ~/.gnupg
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          echo "pinentry-mode loopback"   >> ~/.gnupg/gpg.conf
          gpgconf --kill gpg-agent || true
          echo "$PGP_SECRET" | base64 --decode | gpg --batch --import

      - name: Publish to Maven Central
        env:
          PGP_KEY_HEX: ${{ secrets.PGP_KEY_HEX }}      # shared org secret — rotate here, not in build.sbt
          PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
        # projectMatrix already enumerates the cross-build, so plain publishSigned (no `+`).
        run: sbt "publishSigned; sonaRelease"
